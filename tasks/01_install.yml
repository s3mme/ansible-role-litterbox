---
- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ var_file }}"
  with_first_found:
    - "{{ role_path }}/vars/{{ ansible_distribution }}-{{ ansible_distribution_major_version }}.yml"
    - "{{ role_path }}/vars/{{ ansible_os_family }}-{{ ansible_distribution_major_version }}.yml"
    - "{{ role_path }}/vars/{{ ansible_distribution }}.yml"
    - "{{ role_path }}/vars/{{ ansible_os_family }}.yml"
    - "{{ role_path }}/vars/{{ ansible_lsb.id }}.yml"
  loop_control:
    loop_var: var_file
- name: Ensure Git is installed
  ansible.windows.win_package:
    product_id: Git_is1
    state: present
  register: litterbox_git_install
  failed_when: false

- name: Check if Git is available
  ansible.windows.win_command: git --version
  register: litterbox_git_check
  changed_when: false
  failed_when: false

- name: Install Git via chocolatey if not present
  chocolatey.chocolatey.win_chocolatey:
    name: git
    state: present
  when: litterbox_git_check.rc != 0

- name: Ensure Python {{ litterbox_python_version }} is installed
  ansible.windows.win_command: "{{ litterbox_python_exe }} --version"
  register: litterbox_python_check
  changed_when: false
  failed_when: false

- name: Install Python via chocolatey if not present
  chocolatey.chocolatey.win_chocolatey:
    name: python3
    version: "{{ litterbox_python_version }}"
    state: present
  when: litterbox_python_check.rc != 0

- name: Ensure installation directory exists
  ansible.windows.win_file:
    path: "{{ litterbox_install_dir }}"
    state: directory

- name: Clone LitterBox repository
  ansible.windows.win_command: >-
    git clone --depth 1 --branch {{ litterbox_repo_version }}
    {{ litterbox_repo_url }} "{{ litterbox_install_dir }}"
  args:
    creates: "{{ litterbox_install_dir }}\\litterbox.py"

- name: Update LitterBox repository
  ansible.windows.win_command: git pull origin {{ litterbox_repo_version }}
  args:
    chdir: "{{ litterbox_install_dir }}"
  register: litterbox_git_pull
  changed_when: "'Already up to date' not in litterbox_git_pull.stdout"

- name: Create Python virtual environment
  ansible.windows.win_command: >-
    {{ litterbox_python_exe }} -m venv "{{ litterbox_venv_dir }}"
  args:
    creates: "{{ litterbox_venv_python }}"

- name: Install Python dependencies
  ansible.windows.win_command: >-
    {{ litterbox_venv_pip }} install -r "{{ litterbox_requirements_path }}"
  register: litterbox_pip_install
  changed_when: "'Successfully installed' in litterbox_pip_install.stdout"

- name: Ensure Uploads directory exists
  ansible.windows.win_file:
    path: "{{ litterbox_install_dir }}\\Uploads"
    state: directory

- name: Ensure Results directory exists
  ansible.windows.win_file:
    path: "{{ litterbox_install_dir }}\\Results"
    state: directory
